name: Job Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    concurrency:
      group: job-monitor-companies-${{ github.ref }}-${{ matrix.group_index }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        group_index: [0, 1, 2]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Install Playwright system dependencies
        run: playwright install-deps chromium

      - name: Run monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          SOURCE_MODE: "companies"
          TOTAL_GROUPS: "3"
          GROUP_INDEX: ${{ matrix.group_index }}
          PAGE_GOTO_TIMEOUT_MS: "30000"
          MAX_SCRAPE_RETRIES: "1"
          RETRY_TIMEOUT_MS: "60000"
          MIN_DELAY_SECONDS: "0.5"
          MAX_DELAY_SECONDS: "1.0"
          NEXT_SCAN_HOURS: "2"
        run: python monitor.py

  dashboard:
    needs: monitor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: job-monitor-dashboard-pages
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/generate_dashboard_data.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
